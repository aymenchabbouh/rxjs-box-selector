<!-- Main layout: horizontal boxes row + total value + option selector below -->
<div class="container">

  <!-- Top bar: boxes in a row + total value on the right -->
  <div class="top-bar">
    <div class="box-row">
      @for (id of boxIds; track id) {
        <app-box [boxId]="id" />
      }
    </div>

    <!-- Total value indicator -->
    <div class="total-box">
      <div class="total-label">Total value</div>
      <div class="total-value">{{ totalValue$ | async | number:'1.1-1' }}</div>
    </div>
  </div>

  <!-- Option selector: only when a box is active -->
  @if (hasActiveBox$ | async) {
    <app-option-selector />
  }

  <!-- Remove all button -->
  @if (hasSelections$ | async) {
    <div class="actions">
      <button class="btn-remove" (click)="onRemoveAll()">Remove All Selections</button>
    </div>
  }
</div>
